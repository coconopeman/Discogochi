<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>디코고치 - Decogochi</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Pretendard', sans-serif; }</style>
</head>
<body class="bg-[#f8fafc]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Icons (Fragment 대신 <> 축약형 사용으로 경량화) ---
        const Icon = ({ name, size = 18, className = "" }) => {
            const icons = {
                Star: <path d="m12 2 3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>,
                Sparkles: <><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></>,
                RotateCcw: <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></>,
                Clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
                Trash2: <><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></>,
                X: <><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>,
                LogIn: <><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></>,
                Share2: <><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        // --- Helpers ---
        const formatTime = (s) => `${Math.floor(s / 60)}:${s % 60 < 10 ? '0' : ''}${s % 60}`;

        const hsvToHex = (h, s, v) => {
            s /= 100; v /= 100;
            let c = v * s, x = c * (1 - Math.abs(((h / 60) % 2) - 1)), m = v - c;
            let r = 0, g = 0, b = 0;
            if (h < 60) { r = c; g = x; } else if (h < 120) { r = x; g = c; }
            else if (h < 180) { g = c; b = x; } else if (h < 240) { g = x; b = c; }
            else if (h < 300) { r = x; b = c; } else { r = c; b = x; }
            return '#' + [r, g, b].map(n => Math.round((n + m) * 255).toString(16).padStart(2, '0')).join('');
        };

        // --- Data ---
        const JUNIOR_DATA = [
            { name: "갈대", body: "https://i.imgur.com/kkJcH4l.png", face: "https://i.imgur.com/7fAGnJj.png", faceRect: { x: 20.5, y: 16.5, w: 8.4, h: 10 } },
            { name: "더치", body: "https://i.imgur.com/DA5yEFP.png", face: "https://i.imgur.com/22xba8J.png", faceRect: { x: 19.7, y: 23.6, w: 10, h: 6.7 } },
            { name: "뫄식", body: "https://i.imgur.com/rulk05g.png", face: "https://i.imgur.com/eyfyIyH.png", faceRect: { x: 20.1, y: 22.3, w: 10.3, h: 7.1 } },
            { name: "병태", body: "https://i.imgur.com/9ZVVixI.png", face: "https://i.imgur.com/TqC5aNb.png", faceRect: { x: 17.1, y: 21.8, w: 12.8, h: 11 } },
            { name: "볼복", body: "https://i.imgur.com/na7UzhJ.png", face: "https://i.imgur.com/tVyxfZk.png", faceRect: { x: 19, y: 19.5, w: 13.6, h: 11.4 } },
            { name: "쪽파", body: "https://i.imgur.com/5OtkS3n.png", face: "https://i.imgur.com/SFbRHRU.png", faceRect: { x: 18.9, y: 19.7, w: 12.6, h: 10.9 } },
            { name: "빠다", body: "https://i.imgur.com/JdQLMSv.png", face: "https://i.imgur.com/r5qlEk4.png", faceRect: { x: 17.5, y: 17.7, w: 14.2, h: 8.3 } },
            { name: "부엉", body: "https://i.imgur.com/VktaG9C.png", face: "https://i.imgur.com/qdbdWpP.png", faceRect: { x: 20.6, y: 21.7, w: 9.9, h: 7.8 } },
            { name: "폼식", body: "https://i.imgur.com/JvRVLDP.png", face: "https://i.imgur.com/e3HdU6H.png", faceRect: { x: 16.3, y: 19, w: 16.9, h: 13.7 } }
        ];

        const ADULT_DATA = [
            { name: "갈대", body: "https://i.imgur.com/0eJ7nlh.png", face: "https://i.imgur.com/Z3YOTF5.png", faceRect: { x: 1, y: 15.3, w: 16.9, h: 16.1 } },
            { name: "더치", body: "https://i.imgur.com/Urn822x.png", face: "https://i.imgur.com/rYFBjCg.png", faceRect: { x: 9.3, y: 16.1, w: 28.4, h: 16.7 } },
            { name: "뫄식", body: "https://i.imgur.com/r9ZNExr.png", face: "https://i.imgur.com/cOQ26r9.png", faceRect: { x: 15, y: 22.3, w: 16.9, h: 10.4 } },
            { name: "병태", body: "https://i.imgur.com/yaBZRGJ.png", face: "https://i.imgur.com/x8TY17f.png", faceRect: { x: 12.5, y: 15, w: 22.1, h: 15 } },
            { name: "볼복", body: "https://i.imgur.com/zMSAP6x.png", face: "https://i.imgur.com/wmA4ou0.png", faceRect: { x: 14.7, y: 13.1, w: 21.5, h: 17.2 } },
            { name: "쪽파", body: "https://i.imgur.com/DO43l3O.png", face: "https://i.imgur.com/CNcjx5t.png", faceRect: { x: 18.7, y: 9.7, w: 13.4, h: 11.5 } },
            { name: "빠다", body: "https://i.imgur.com/VSPomTp.png", face: "https://i.imgur.com/tbn0MA4.png", faceRect: { x: 14.9, y: 10.2, w: 22.5, h: 14.1 } },
            { name: "부엉", body: "https://i.imgur.com/3wOR5DQ.png", face: "https://i.imgur.com/JqPL4kE.png", faceRect: { x: 10, y: 21.5, w: 25.1, h: 13.9 } },
            { name: "폼식", body: "https://i.imgur.com/xNhFh58.png", face: "https://i.imgur.com/DZPqRtJ.png", faceRect: { x: 15.2, y: 19, w: 19.6, h: 14.2 } }
        ];

        // --- Components ---
        const CharacterRenderer = ({ genes, stage, size = 200, id }) => {
            if (!genes || genes.bodyIndex === undefined) return <div className="text-xs text-red-400">데이터 오류</div>;

            if (stage === "egg") {
                return (
                    <div className="relative flex items-center justify-center animate-bounce duration-[2000ms]" style={{ width: size, height: size }}>
                        <img src="https://i.imgur.com/WFsA2pQ.png" alt="Egg" className="w-[70%] h-[70%] object-contain drop-shadow-md" />
                    </div>
                );
            }

            const dataSet = stage === "baby" ? JUNIOR_DATA : ADULT_DATA;
            const bodyData = dataSet[genes.bodyIndex] || dataSet[0];
            const faceData = dataSet[genes.faceIndex] || dataSet[0];
            const rect = bodyData.faceRect || { x: 10, y: 10, w: 30, h: 30 };
            
            const bodyColor = hsvToHex(genes.hue, stage === "baby" ? genes.saturation * 0.2 : genes.saturation * 0.5, 95);
            const filterId = `multiply-filter-${id}-${stage}`;

            return (
                <div className="relative flex items-center justify-center transition-transform duration-500 hover:scale-110" style={{ width: size, height: size }}>
                    <svg viewBox="0 0 50 50" className="w-full h-full drop-shadow-2xl overflow-visible">
                        <defs>
                            <filter id={filterId}>
                                <feFlood floodColor={bodyColor} result="flood" />
                                <feComposite in="flood" in2="SourceAlpha" operator="in" result="colored" />
                                <feBlend in="colored" in2="SourceGraphic" mode="multiply" />
                            </filter>
                        </defs>
                        <g filter={`url(#${filterId})`}>
                            <image href={bodyData.body} width="50" height="50" preserveAspectRatio="xMidYMid meet" />
                        </g>
                        <image href={faceData.face} x={rect.x} y={rect.y} width={rect.w} height={rect.h} preserveAspectRatio="xMidYMid meet" />
                    </svg>
                </div>
            );
        };

        function App() {
            const [myMonster, setMyMonster] = useState(null);
            const [partnerMonster, setPartnerMonster] = useState(null);
            const [importText, setImportText] = useState("");
            const [timeLeft, setTimeLeft] = useState(0);
            const [timerType, setTimerType] = useState(null);
            const [isNaming, setIsNaming] = useState(false);
            const [tempName, setTempName] = useState("");
            const [showResetConfirm, setShowResetConfirm] = useState(false);

            useEffect(() => {
                try {
                    const savedMonster = JSON.parse(localStorage.getItem('decogochi_my_monster'));
                    if (savedMonster) {
                        setMyMonster(savedMonster);
                    } else {
                        const idx = Math.floor(Math.random() * ADULT_DATA.length);
                        setMyMonster({
                            name: ADULT_DATA[idx].name, stage: 'adult',
                            genes: { bodyIndex: idx, faceIndex: idx, hue: Math.floor(Math.random() * 360), saturation: 80 }
                        });
                    }

                    const savedTimer = JSON.parse(localStorage.getItem('decogochi_timer'));
                    if (savedTimer) {
                        const diff = Math.max(0, Math.floor((savedTimer.endTime - Date.now()) / 1000));
                        setTimerType(savedTimer.type);
                        setTimeLeft(diff);
                    }
                } catch {
                    handleReset();
                }
            }, []);

            useEffect(() => {
                if (myMonster) localStorage.setItem('decogochi_my_monster', JSON.stringify(myMonster));
            }, [myMonster]);

            useEffect(() => {
                if (!timerType || timeLeft <= 0) return;
                const timer = setInterval(() => setTimeLeft(prev => {
                    if (prev <= 1) { localStorage.removeItem('decogochi_timer'); return 0; }
                    return prev - 1;
                }), 1000);
                return () => clearInterval(timer);
            }, [timerType, timeLeft]);

            const handleReset = () => { localStorage.clear(); window.location.reload(); };

            const exportData = () => {
                try {
                    // JSON 전체 대신 필수 데이터만 문자열로 압축 (이름|body|face|hue|sat)
                    const g = myMonster.genes;
                    const shortData = `${myMonster.name}|${g.bodyIndex}|${g.faceIndex}|${g.hue}|${g.saturation}`;
                    const data = btoa(unescape(encodeURIComponent(shortData)));
                    
                    const tx = document.createElement("textarea");
                    tx.value = data; document.body.appendChild(tx);
                    tx.select(); document.execCommand('copy'); tx.remove();
                } catch {}
            };

            const importData = () => {
                try {
                    if (!importText) return;
                    const decoded = decodeURIComponent(escape(atob(importText)));
                    
                    if (decoded.includes('|')) { // 새 압축 포맷 파싱
                        const p = decoded.split('|');
                        setPartnerMonster({
                            name: p[0], stage: 'adult',
                            genes: { bodyIndex: +p[1], faceIndex: +p[2], hue: +p[3], saturation: +p[4] }
                        });
                        setImportText("");
                    } else { // 기존 JSON 포맷 하위 호환
                        const parsed = JSON.parse(decoded);
                        if (parsed.stage === 'adult') { setPartnerMonster(parsed); setImportText(""); }
                    }
                } catch {}
            };

            const confirmBreeding = () => {
                if (!tempName.trim()) return;
                const duration = 300;
                setMyMonster({ name: tempName, stage: 'egg', genes: myMonster.genes, parents: [myMonster.genes, partnerMonster.genes] });
                setPartnerMonster(null); setTimerType('hatch'); setTimeLeft(duration);
                localStorage.setItem('decogochi_timer', JSON.stringify({ endTime: Date.now() + duration * 1000, type: 'hatch' }));
                setIsNaming(false); setTempName("");
            };

            const handleHatchOrGrow = () => {
                setMyMonster(prev => {
                    if (!prev || !prev.parents) return prev;
                    const [p1, p2] = prev.parents;
                    const isGrow = timerType === 'grow';
                    const nextStage = isGrow ? 'adult' : 'baby';
                    
                    const r = Math.random();
                    const genes = isGrow ? { ...prev.genes } : {
                        bodyIndex: Math.random() > 0.5 ? p1.bodyIndex : p2.bodyIndex,
                        faceIndex: Math.random() > 0.5 ? p1.faceIndex : p2.faceIndex,
                        hue: r < 0.3 ? p1.hue : r < 0.6 ? p2.hue : Math.floor(Math.random() * 360),
                        saturation: 80
                    };

                    if (isGrow) {
                        ['bodyIndex', 'faceIndex'].forEach(k => Math.random() > 0.5 && (genes[k] = Math.random() > 0.5 ? p1[k] : p2[k]));
                        if (Math.random() < 0.3) genes.hue = Math.floor(Math.random() * 360);
                        setTimerType(null); setTimeLeft(0); localStorage.removeItem('decogochi_timer');
                    } else {
                        const duration = 600;
                        setTimerType('grow'); setTimeLeft(duration);
                        localStorage.setItem('decogochi_timer', JSON.stringify({ endTime: Date.now() + duration * 1000, type: 'grow' }));
                    }
                    return { ...prev, stage: nextStage, genes };
                });
            };

            if (!myMonster) return null;

            return (
                <div className="min-h-screen bg-[#f8fafc] flex flex-col items-center justify-center p-4 text-slate-900">
                    <div className="w-full max-w-sm bg-white rounded-[3rem] p-6 shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-slate-100 relative">
                        {/* Top Bar */}
                        <div className="flex justify-between items-center mb-6 px-2">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-blue-500 rounded-xl flex items-center justify-center shadow-lg shadow-blue-100">
                                    <Icon name="Sparkles" size={16} className="text-white fill-current" />
                                </div>
                                <h1 className="text-xl font-black text-slate-800 tracking-tight">디코고치</h1>
                            </div>
                            <button onClick={() => setShowResetConfirm(true)} className="p-2 text-slate-300 hover:text-rose-400 transition-colors bg-slate-50 rounded-full">
                                <Icon name="RotateCcw" size={18} />
                            </button>
                        </div>

                        {/* Display Screen */}
                        <div className="relative aspect-square bg-slate-50 rounded-[2.5rem] flex flex-col items-center justify-center mb-6 border border-slate-100 shadow-inner overflow-hidden">
                            <div className="absolute inset-0 opacity-[0.03] pointer-events-none" style={{ backgroundImage: 'radial-gradient(#475569 1px, transparent 1px)', backgroundSize: '20px 20px' }}></div>
                            
                            <div className="mb-8">
                                <CharacterRenderer genes={myMonster.genes} stage={myMonster.stage} id="main" size={240} />
                            </div>
                            
                            <div className="absolute bottom-4 left-0 right-0 flex flex-col items-center gap-1">
                                <h2 className="text-xl font-black text-slate-800 tracking-tight">{myMonster.name}</h2>
                                <div className="flex items-center gap-2">
                                    <span className={`text-[9px] px-2.5 py-0.5 rounded-full font-bold uppercase tracking-wider ${
                                        myMonster.stage === 'adult' ? 'bg-blue-100 text-blue-600' :
                                        myMonster.stage === 'baby' ? 'bg-green-100 text-green-600' : 'bg-amber-100 text-amber-600'
                                    }`}>
                                        {myMonster.stage}
                                    </span>
                                    {timerType && timeLeft > 0 && (
                                        <div className="flex items-center gap-1 px-2.5 py-0.5 bg-slate-200 text-slate-600 rounded-full text-[9px] font-bold">
                                            <Icon name="Clock" size={10} /> {formatTime(timeLeft)}
                                        </div>
                                    )}
                                </div>
                            </div>

                            {timerType && timeLeft === 0 && (
                                <button onClick={handleHatchOrGrow} className="absolute inset-0 bg-white/20 backdrop-blur-[2px] flex items-center justify-center transition-all group">
                                    <div className="bg-blue-600 text-white font-black px-6 py-3 rounded-2xl shadow-xl transform group-hover:scale-105 active:scale-95 transition-all">
                                        {timerType === 'hatch' ? '부화하기!' : '성장하기!'}
                                    </div>
                                </button>
                            )}
                        </div>

                        {/* Actions Area */}
                        <div className="space-y-3">
                            {myMonster.stage === 'adult' && !timerType && (
                                <>
                                    {partnerMonster ? (
                                        <div className="bg-blue-50 border border-blue-100 rounded-2xl p-3 flex items-center gap-3 animate-in fade-in zoom-in">
                                            <div className="w-12 h-12 bg-white rounded-xl shadow-sm flex items-center justify-center overflow-hidden">
                                                <CharacterRenderer genes={partnerMonster.genes} stage="adult" size={50} id="partner" />
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <p className="text-[10px] text-blue-500 font-bold uppercase leading-none mb-1">Partner</p>
                                                <p className="font-bold text-slate-700 truncate text-sm">{partnerMonster.name}</p>
                                            </div>
                                            <div className="flex gap-1">
                                                <button onClick={() => setPartnerMonster(null)} className="p-2 text-slate-400 hover:text-slate-600"><Icon name="X" size={18} /></button>
                                                <button onClick={() => setIsNaming(true)} className="bg-blue-600 text-white p-2.5 rounded-xl shadow-lg shadow-blue-100 active:scale-90 transition-transform"><Icon name="Star" size={18} className="fill-current" /></button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="flex bg-slate-100 rounded-2xl p-1 items-center">
                                            <input type="text" value={importText} onChange={e => setImportText(e.target.value)} placeholder="친구 코드를 입력하세요" className="flex-1 bg-transparent border-none px-4 py-3 text-sm focus:outline-none placeholder:text-slate-400 font-semibold" />
                                            <button onClick={importData} className="bg-white text-slate-600 hover:text-blue-600 p-2.5 rounded-xl shadow-sm active:scale-95 transition-all"><Icon name="LogIn" size={18} /></button>
                                        </div>
                                    )}
                                    <button onClick={exportData} className="w-full bg-slate-800 hover:bg-slate-900 text-white py-4 rounded-2xl text-sm font-black flex items-center justify-center gap-2 shadow-xl active:scale-[0.98] transition-all">
                                        <Icon name="Share2" size={16} /> 데이터 내보내기 (복사)
                                    </button>
                                </>
                            )}

                            {timerType && timeLeft > 0 && (
                                <div className="bg-slate-50 border border-slate-100 rounded-2xl p-5 text-center">
                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">{timerType === 'hatch' ? "Hatching Process" : "Growing Process"}</p>
                                    <div className="text-2xl font-black text-blue-600 tabular-nums">{formatTime(timeLeft)}</div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Modals */}
                    {showResetConfirm && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6 z-50">
                            <div className="bg-white w-full max-w-xs p-8 rounded-[2.5rem] shadow-2xl text-center">
                                <div className="w-16 h-16 bg-rose-50 rounded-2xl flex items-center justify-center mx-auto mb-6 text-rose-500"><Icon name="Trash2" size={28} /></div>
                                <h3 className="text-xl font-black text-slate-800 mb-2">데이터 초기화</h3>
                                <p className="text-slate-500 text-sm mb-8 leading-relaxed">정말로 처음부터 다시<br/>시작하시겠습니까?</p>
                                <div className="flex gap-2">
                                    <button onClick={() => setShowResetConfirm(false)} className="flex-1 bg-slate-100 text-slate-600 py-4 rounded-xl text-xs font-black">취소</button>
                                    <button onClick={handleReset} className="flex-1 bg-rose-500 text-white py-4 rounded-xl text-xs font-black shadow-lg shadow-rose-100">초기화</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {isNaming && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-md flex items-center justify-center p-6 z-50">
                            <div className="bg-white w-full max-w-xs p-8 rounded-[2.5rem] shadow-2xl text-center border border-slate-100">
                                <div className="w-24 h-24 bg-blue-50 rounded-3xl flex items-center justify-center mx-auto mb-6 border border-blue-100">
                                    <img src="https://i.imgur.com/WFsA2pQ.png" alt="New Egg" className="w-16 h-16 object-contain animate-pulse" />
                                </div>
                                <h3 className="text-xl font-black mb-6 text-slate-800">알의 이름 짓기</h3>
                                <input autoFocus type="text" maxLength={10} value={tempName} onChange={e => setTempName(e.target.value)} className="w-full bg-slate-100 border-none rounded-xl px-4 py-4 text-center mb-6 focus:ring-2 focus:ring-blue-500 outline-none font-bold text-lg" placeholder="이름 입력" />
                                <div className="flex gap-2">
                                    <button onClick={() => setIsNaming(false)} className="flex-1 bg-slate-100 text-slate-600 py-4 rounded-xl text-xs font-black">취소</button>
                                    <button onClick={confirmBreeding} className="flex-1 bg-blue-600 text-white py-4 rounded-xl text-xs font-black shadow-lg shadow-blue-100">알 만들기</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
